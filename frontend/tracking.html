<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracking - Amdani</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="topbar">Check your order status in seconds.</div>

  <header>
    <div class="wrap nav">
      <div class="brand">
        <div class="logo">
          <img src="assets/images/logo.svg" alt="logo">
        </div>
        <div>
          <h1>AMDANI</h1>
          <p>FRAGRANCES</p>
        </div>
      </div>

      <div class="menu">
        <a href="../index.html">Home</a>
        <a href="../index.html#categories">Categories</a>
        <a href="products.html">Collection</a>
        <a href="../index.html#offers">Offers</a>
        <a href="tracking.html">Tracking</a>
        <a href="order.html">Order</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </header>

  <main>
    <section class="page-title">
      <div class="wrap">
        <div class="tag">ORDER TRACKING</div>
        <h2>Track your order</h2>
      </div>
    </section>

    <section style="padding-top:10px">
      <div class="wrap split">
        <div class="glass card">
          <div class="order-row" style="margin-top:16px">
            <input id="trackInput" placeholder="Enter tracking ID">
            <input id="trackPhone" placeholder="Optional phone number">
          </div>

          <div class="hero-actions">
            <button class="btn" id="trackBtn">Check Status</button>
          </div>

          <div class="status" id="trackResult">
            <div class="status-item">Order Placed</div>
            <div class="status-item">Confirmed</div>
            <div class="status-item">Shipped</div>
            <div class="status-item">Delivered</div>
          </div>
        </div>

        <div class="glass card">
          <div class="tag">HELP</div>
          <p class="muted">Need help? Contact us on WhatsApp or call using the contact page.</p>
          <a class="btn" href="contact.html">Contact Us</a>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
