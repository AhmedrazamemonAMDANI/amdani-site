<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amdani Admin Panel</title>
  <link rel="stylesheet" href="../frontend/assets/css/styles.css">
  <style>
    body { padding-bottom: 40px; }
    .admin-inputs input,
    .admin-inputs textarea,
    .admin-inputs select {
      flex: 1;
      min-width: 180px;
    }
    .danger {
      background: #4b1111;
      color: #fff;
      border: 1px solid rgba(255,255,255,.1);
    }
  </style>
</head>
<body>
  <div class="topbar">Amdani Admin Panel</div>

  <main class="wrap" style="padding-top:30px">
    <div class="grid4">
      <div class="glass card">
        <div>Total Orders</div>
        <div class="admin-stat" id="statOrders">0</div>
      </div>
      <div class="glass card">
        <div>Pending</div>
        <div class="admin-stat" id="statPending">0</div>
      </div>
      <div class="glass card">
        <div>Delivered</div>
        <div class="admin-stat" id="statDelivered">0</div>
      </div>
      <div class="glass card">
        <div>Revenue</div>
        <div class="admin-stat" id="statRevenue">Rs. 0</div>
      </div>
    </div>

    <div class="glass card">
      <div class="tag">ORDERS</div>
      <div class="hero-actions">
        <button class="btn" id="refreshBtn">Refresh</button>
        <input id="trackSearch" placeholder="Search tracking ID">
        <button class="btn2" id="searchBtn">Search</button>
      </div>

      <div style="overflow:auto;margin-top:16px">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Tracking</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Address</th>
              <th>City</th>
              <th>Postal Code</th>
              <th>Perfume</th>
              <th>Status</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody id="ordersBody"></tbody>
        </table>
      </div>
    </div>

    <div class="glass card">
      <div class="tag">PRODUCTS</div>
      <div style="overflow:auto;margin-top:16px">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Type</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Lasting</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="productsBody"></tbody>
        </table>
      </div>
    </div>

    <div class="glass card">
      <div class="tag">EDIT / ADD PRODUCT</div>

      <div class="admin-inputs" style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px">
        <input id="pId" placeholder="ID (blank for new)">
        <input id="pName" placeholder="Name">
        <input id="pCategory" placeholder="Category">
        <input id="pType" placeholder="Type">
        <input id="pPrice" placeholder="Price">
        <input id="pOldPrice" placeholder="Old Price">
        <input id="pStock" placeholder="Stock">
        <input id="pBadge" placeholder="Badge">
        <input id="pLasting" placeholder="Lasting">
        <input id="pInspired" placeholder="Inspired By">
        <input id="pTop" placeholder="Top Notes">
        <input id="pHeart" placeholder="Heart Notes">
        <input id="pBase" placeholder="Base Notes">
        <input id="pLongevity" placeholder="Longevity">
        <input id="pProjection" placeholder="Projection">
        <input id="pBestFor" placeholder="Best For">
        <textarea id="pDesc" placeholder="Description"></textarea>
      </div>

      <div class="hero-actions">
        <button class="btn" id="saveBtn">Save Product</button>
        <button class="btn2 danger" id="deleteBtn">Delete Product</button>
      </div>

      <div id="adminMsg" class="muted"></div>
    </div>
  </main>

  <script src="admin.js"></script>
</body>
</html>
