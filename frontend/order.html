<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Order - Amdani</title><link rel="stylesheet" href="assets/css/styles.css"></head><body><div class="topbar">Fast and secure luxury order form.</div><header><div class="wrap nav"><div class="brand"><div class="logo"><img src="assets/images/logo.svg" alt="logo"></div><div><h1>AMDANI</h1><p>FRAGRANCES</p></div></div><div class="menu"><a href="index.html">Home</a><a href="products.html">Products</a><a href="cart.html">Cart</a><a href="tracking.html">Tracking</a></div><div style="display:flex;gap:10px"><button class="btn2" id="openCartBtn">Cart</button></div></div></header><div class="cart glass" id="cartBox"><div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><div class="tag">YOUR CART</div><button class="btn2" id="closeCartBtn">Close</button></div><div id="cartItems" class="status" style="margin-top:14px"></div><div class="status-item" style="margin-top:10px"><span>Total</span><strong style="margin-left:auto" id="cartTotal">Rs. 0</strong></div></div></div><main><section class="page-title"><div class="wrap"><div class="tag">CHECKOUT</div><h2>Place your order</h2></div></section><section style="padding-top:10px"><div class="wrap split"><div class="glass card"><div class="tag">COMPLETE ORDER FORM</div><div class="order-row" style="margin-top:18px"><input id="name" placeholder="Full name"><input id="phone" placeholder="Phone number"><input id="email" placeholder="Email address"><select id="perfumeSelect"></select><input id="city" placeholder="City"><input id="province" placeholder="Province"><input id="postal" placeholder="Postal code"><input id="quantity" type="number" min="1" value="1" placeholder="Quantity"></div><div style="margin-top:14px"><input id="address" placeholder="Full address"></div><div class="order-row" style="margin-top:14px"><select id="payment"><option>Cash on Delivery</option><opt
