<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Amdani</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="cursor-glow" id="cursorGlow"></div>
  <div class="topbar">Explore the full luxury collection.</div>

  <header>
    <div class="wrap nav">
      <div class="brand">
        <div class="logo">
          <img src="assets/images/logo.svg" alt="logo">
        </div>
        <div>
          <h1>AMDANI</h1>
          <p>FRAGRANCES</p>
        </div>
      </div>

      <div class="menu">
        <a href="../index.html">Home</a>
        <a href="../index.html#categories">Categories</a>
        <a href="products.html">Collection</a>
        <a href="../index.html#offers">Offers</a>
        <a href="tracking.html">Tracking</a>
        <a href="order.html">Order</a>
        <a href="contact.html">Contact</a>
      </div>

      <div style="display:flex;gap:10px">
        <button class="btn2" id="openCartBtn">Cart</button>
      </div>
    </div>
  </header>

  <div class="cart glass" id="cartBox">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="tag">YOUR CART</div>
        <button class="btn2" id="closeCartBtn">Close</button>
      </div>
      <div id="cartItems" class="status" style="margin-top:14px"></div>
      <div class="status-item" style="margin-top:10px">
        <span>Total</span>
        <strong style="margin-left:auto" id="cartTotal">Rs. 0</strong>
      </div>
      <a class="btn" href="cart.html" style="margin-top:14px;width:100%">Open Cart Page</a>
    </div>
  </div>

  <main>
    <section class="page-title">
      <div class="wrap">
        <div class="tag">COLLECTION</div>
        <h2>Luxury perfumes</h2>
      </div>
    </section>

    <section style="padding-top:10px">
      <div class="wrap">
        <div class="filters">
          <button class="chipbtn active" data-filter="all">All</button>
          <button class="chipbtn" data-filter="male">Male</button>
          <button class="chipbtn" data-filter="female">Female</button>
          <button class="chipbtn" data-filter="unisex">Unisex</button>
          <button class="chipbtn" data-filter="middle-east">Middle East</button>
          <button class="chipbtn" data-filter="bottles">Bottles</button>
        </div>

        <div class="grid3" id="productGrid" style="margin-top:18px"></div>
      </div>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
